<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1280px;
    height: 720px;
    overflow: hidden;
    font-family: "Microsoft YaHei UI", "Microsoft YaHei", "PingFang SC", "Segoe UI", Arial, sans-serif;
    color: #f7fbff;
    background:
      radial-gradient(circle at 82% 12%, rgba(188, 231, 255, 0.78), transparent 260px),
      radial-gradient(circle at 48% 101%, rgba(124, 170, 255, 0.42), transparent 320px),
      linear-gradient(145deg, #9ec6f1 0%, #7fb0e1 42%, #a7d0ef 100%);
    position: relative;
    -webkit-font-smoothing: antialiased;
    text-rendering: geometricPrecision;
  }

  body::before,
  body::after {
    content: "";
    position: absolute;
    inset: 0;
    pointer-events: none;
  }

  body::before {
    background:
      radial-gradient(ellipse at 8% 18%, rgba(255,255,255,0.34), transparent 210px),
      radial-gradient(ellipse at 92% 88%, rgba(45,124,210,0.18), transparent 260px),
      linear-gradient(115deg, transparent 0 57%, rgba(255,255,255,0.16) 58%, rgba(255,255,255,0.04) 72%, transparent 73%);
    filter: blur(1px);
  }

  body::after {
    background:
      linear-gradient(95deg, transparent 0 22%, rgba(255,255,255,0.11) 23%, transparent 25%),
      linear-gradient(105deg, transparent 0 76%, rgba(255,255,255,0.12) 77%, transparent 79%);
    opacity: 0.8;
  }

  .dashboard {
    position: absolute;
    left: 50px;
    top: 38px;
    width: 1180px;
    height: 644px;
    padding: 64px 60px 54px;
    border-radius: 72px;
    background:
      linear-gradient(140deg, rgba(120, 184, 239, 0.32), rgba(33, 103, 177, 0.52) 52%, rgba(34, 112, 195, 0.45)),
      radial-gradient(circle at 86% 7%, rgba(255,255,255,0.42), transparent 210px),
      radial-gradient(circle at 8% 88%, rgba(71, 158, 239, 0.24), transparent 280px);
    border: 1px solid rgba(240, 253, 255, 0.48);
    box-shadow:
      0 48px 92px rgba(34, 83, 145, 0.42),
      0 18px 44px rgba(231, 251, 255, 0.22),
      inset 0 0 0 2px rgba(255,255,255,0.2),
      inset 0 0 0 8px rgba(141, 215, 255, 0.12),
      inset 0 7px 18px rgba(255,255,255,0.66),
      inset 0 -18px 38px rgba(23, 83, 165,0.22);
    overflow: hidden;
    z-index: 1;
  }

  .dashboard::before {
    content: "";
    position: absolute;
    inset: 9px;
    border-radius: 63px;
    border: 2px solid rgba(240, 252, 255, 0.3);
    box-shadow:
      inset 14px 0 18px rgba(255,255,255,0.38),
      inset -16px 0 22px rgba(20, 85, 176,0.24),
      inset 0 15px 24px rgba(255,255,255,0.26),
      inset 0 -13px 22px rgba(116, 202, 255, 0.2);
    pointer-events: none;
  }

  .dashboard::after {
    content: "";
    position: absolute;
    left: 26px;
    right: 26px;
    top: 10px;
    height: 24px;
    border-radius: 999px;
    background:
      linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.72) 8%, rgba(255,255,255,0.95) 30%, rgba(162,238,255,0.76) 72%, transparent 100%),
      linear-gradient(180deg, rgba(255,255,255,0.78), transparent);
    filter: blur(5px);
    opacity: 0.9;
    pointer-events: none;
  }

  .edge-glow {
    position: absolute;
    inset: auto 62px -6px 62px;
    height: 20px;
    border-radius: 999px;
    background: linear-gradient(90deg, transparent, rgba(160, 219, 255, 0.88), rgba(255,255,255,0.9), rgba(162, 223, 255, 0.82), transparent);
    filter: blur(6px);
    opacity: 0.72;
  }

  .corner-glint {
    position: absolute;
    z-index: 2;
    pointer-events: none;
  }

  .corner-glint.tl {
    left: 13px;
    top: 14px;
    width: 112px;
    height: 112px;
    border-radius: 58px 0 0 0;
    border-top: 10px solid rgba(255,255,255,0.74);
    border-left: 10px solid rgba(255,255,255,0.62);
    filter: blur(2px);
    opacity: 0.62;
  }

  .corner-glint.br {
    right: 13px;
    bottom: 13px;
    width: 138px;
    height: 92px;
    border-radius: 0 0 60px 0;
    border-right: 8px solid rgba(165, 230, 255, 0.54);
    border-bottom: 8px solid rgba(255,255,255,0.58);
    filter: blur(2px);
    opacity: 0.56;
  }

  .header {
    position: relative;
    z-index: 2;
    padding-left: 20px;
  }

  .top-metrics {
    position: absolute;
    z-index: 3;
    top: 62px;
    right: 72px;
    display: flex;
    gap: 16px;
    align-items: stretch;
  }

  .metric-chip {
    position: relative;
    min-width: 168px;
    height: 88px;
    padding: 14px 18px 12px;
    border-radius: 24px;
    background:
      linear-gradient(145deg, rgba(170, 224, 255, 0.24), rgba(38, 119, 204, 0.24)),
      radial-gradient(circle at 24% 12%, rgba(255,255,255,0.42), transparent 42%);
    border: 1px solid rgba(235, 250, 255, 0.38);
    box-shadow:
      0 18px 32px rgba(22, 76, 145, 0.28),
      inset 0 0 0 1px rgba(255,255,255,0.18),
      inset 0 5px 12px rgba(255,255,255,0.32),
      inset 0 -8px 14px rgba(28, 94, 180, 0.14);
    backdrop-filter: blur(18px);
    -webkit-backdrop-filter: blur(18px);
    overflow: hidden;
  }

  .metric-chip::before {
    content: "";
    position: absolute;
    left: 14px;
    right: 14px;
    top: 7px;
    height: 3px;
    border-radius: 999px;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.78), transparent);
    filter: blur(1px);
    opacity: 0.78;
  }

  .metric-label {
    position: relative;
    font-size: 11px;
    line-height: 1;
    font-weight: 800;
    letter-spacing: 0;
    color: rgba(213, 239, 255, 0.82);
    text-transform: uppercase;
    text-shadow: 0 2px 7px rgba(15, 67, 130, 0.3);
  }

  .metric-value {
    position: relative;
    margin-top: 8px;
    font-size: 29px;
    line-height: 1;
    font-weight: 900;
    color: #fff;
    text-shadow: 0 5px 13px rgba(14, 62, 127, 0.36);
    white-space: nowrap;
  }

  .metric-sub {
    position: relative;
    margin-top: 4px;
    font-size: 12px;
    line-height: 1;
    font-weight: 700;
    color: rgba(224, 245, 255, 0.76);
    white-space: nowrap;
    max-width: 190px;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .metric-chip.live {
    min-width: 148px;
  }

  .metric-chip.alert {
    min-width: 224px;
  }

  .alert-row {
    position: relative;
    display: flex;
    align-items: flex-start;
    gap: 9px;
    margin-top: 8px;
  }

  .alert-dot {
    width: 12px;
    height: 12px;
    border-radius: 50%;
    flex: 0 0 auto;
    margin-top: 5px;
    background: #aee0ff;
    box-shadow: 0 0 14px rgba(174, 224, 255, 0.72);
  }

  .metric-chip.alert .metric-value {
    flex: 1 1 auto;
    min-width: 0;
    margin-top: 0;
    font-size: 20px;
    line-height: 1.12;
    max-width: 176px;
    overflow: hidden;
    display: -webkit-box;
    -webkit-box-orient: vertical;
    -webkit-line-clamp: 2;
    white-space: normal;
    text-overflow: ellipsis;
  }

  .metric-chip.alert-none {
    opacity: 0.84;
  }

  .metric-chip.alert-yellow .alert-dot,
  .metric-chip.alert-active .alert-dot {
    background: #ffd65a;
    box-shadow: 0 0 18px rgba(255, 214, 90, 0.9);
  }

  .metric-chip.alert-orange .alert-dot {
    background: #ff9c3d;
    box-shadow: 0 0 20px rgba(255, 156, 61, 0.95);
  }

  .metric-chip.alert-red .alert-dot {
    background: #ff5d6c;
    box-shadow: 0 0 22px rgba(255, 93, 108, 0.95);
  }

  .metric-chip.alert-blue .alert-dot {
    background: #7fd4ff;
    box-shadow: 0 0 18px rgba(127, 212, 255, 0.9);
  }

  .title {
    font-size: 52px;
    line-height: 1;
    font-weight: 800;
    color: #fff;
    letter-spacing: 0;
    text-shadow: 0 5px 15px rgba(20,70,134,0.36);
  }

  .subtitle {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-top: 20px;
    color: rgba(230, 248, 255, 0.92);
    font-size: 24px;
    font-weight: 700;
    text-shadow: 0 3px 10px rgba(20,70,134,0.28);
  }

  .pin {
    width: 18px;
    height: 24px;
    display: inline-block;
    position: relative;
    border-radius: 12px 12px 14px 14px;
    background: linear-gradient(180deg, #dff7ff, #8fd3ff);
    box-shadow: 0 4px 12px rgba(18, 86, 153, 0.32);
  }

  .pin::before {
    content: "";
    position: absolute;
    left: 6px;
    top: 6px;
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: rgba(45,111,183,0.85);
  }

  .pin::after {
    content: "";
    position: absolute;
    left: 5px;
    bottom: -5px;
    width: 9px;
    height: 9px;
    background: linear-gradient(135deg, #8fd3ff, #dff7ff);
    transform: rotate(45deg);
    border-radius: 2px;
  }

  .divider {
    position: relative;
    z-index: 2;
    height: 1px;
    margin: 30px 0 24px;
    background: linear-gradient(90deg, rgba(255,255,255,0.1), rgba(234,248,255,0.68), rgba(255,255,255,0.1));
    box-shadow: 0 1px 5px rgba(255,255,255,0.24);
  }

  .forecast-grid {
    position: relative;
    z-index: 2;
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    height: 382px;
  }

  .forecast-col {
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 0 14px;
    min-width: 0;
    transform-style: preserve-3d;
  }

  .forecast-col + .forecast-col::before {
    content: "";
    position: absolute;
    left: 0;
    top: 8px;
    bottom: 0;
    width: 1px;
    background: linear-gradient(180deg, rgba(236,249,255,0.72), rgba(236,249,255,0.24), rgba(236,249,255,0.56));
    box-shadow: 0 0 12px rgba(255,255,255,0.16);
  }

  .day {
    font-size: 29px;
    line-height: 1;
    font-weight: 800;
    letter-spacing: 0;
    color: #fff;
    text-shadow: 0 6px 12px rgba(20,66,126,0.4);
  }

  .date {
    margin-top: 10px;
    font-size: 26px;
    line-height: 1;
    font-weight: 700;
    color: #aee0ff;
    text-shadow: 0 4px 10px rgba(18,74,138,0.34);
  }

  .icon-wrap {
    width: 128px;
    height: 122px;
    margin: 18px 0 18px;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    perspective: 500px;
    filter: drop-shadow(0 24px 22px rgba(10, 53, 116, 0.45));
  }

  .icon-wrap::before {
    content: "";
    position: absolute;
    left: 5px;
    right: 5px;
    bottom: 0;
    height: 28px;
    border-radius: 999px;
    background:
      radial-gradient(ellipse, rgba(9, 55, 126, 0.52), rgba(9, 55, 126, 0.12) 55%, transparent 74%);
    filter: blur(12px);
    transform: rotateX(62deg);
  }

  .icon-wrap::after {
    content: "";
    position: absolute;
    inset: -4px;
    border-radius: 42px;
    background:
      radial-gradient(circle at 31% 18%, rgba(255,255,255,0.54), transparent 17%),
      radial-gradient(circle at 65% 78%, rgba(109, 197, 255,0.26), transparent 34%),
      radial-gradient(ellipse at 50% 92%, rgba(12, 67, 140, 0.24), transparent 44%);
    filter: blur(8px);
    opacity: 0.82;
    transform: translateY(-5px);
    pointer-events: none;
  }

  .icon-wrap img {
    width: 116px;
    height: 116px;
    position: relative;
    z-index: 1;
    transform: rotateX(10deg) rotateY(-10deg) translateZ(30px);
    filter:
      saturate(1.18)
      contrast(1.08)
      drop-shadow(0 26px 20px rgba(7, 48, 113, 0.5))
      drop-shadow(-7px -7px 5px rgba(255,255,255,0.4))
      drop-shadow(5px 4px 3px rgba(255,255,255,0.16));
  }

  .weather-sunny .icon-wrap::after,
  .weather-partly .icon-wrap::after {
    background:
      radial-gradient(circle at 40% 35%, rgba(255, 218, 88, 0.52), transparent 28%),
      radial-gradient(circle at 58% 74%, rgba(255,255,255,0.26), transparent 38%);
    opacity: 0.86;
  }

  .weather-rain .icon-wrap::after,
  .weather-thunder .icon-wrap::after {
    background:
      radial-gradient(circle at 52% 28%, rgba(214, 232, 246, 0.34), transparent 28%),
      radial-gradient(circle at 58% 76%, rgba(85, 177, 255, 0.32), transparent 34%);
  }

  .weather-thunder .icon-wrap img {
    filter:
      saturate(1.22)
      contrast(1.1)
      drop-shadow(0 27px 21px rgba(7, 34, 82, 0.54))
      drop-shadow(-7px -7px 5px rgba(255,255,255,0.28))
      drop-shadow(0 0 15px rgba(255, 205, 72, 0.34));
  }

  .temps {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
  }

  .high {
    font-size: 48px;
    line-height: 0.96;
    font-weight: 900;
    color: #fff;
    text-shadow: 0 7px 16px rgba(15,65,127,0.42);
  }

  .low {
    font-size: 30px;
    line-height: 1;
    font-weight: 800;
    color: #aee0ff;
    text-shadow: 0 5px 13px rgba(15,65,127,0.4);
  }

  .wind {
    margin-top: 20px;
    display: grid;
    grid-template-columns: 42px auto;
    align-items: center;
    column-gap: 8px;
    min-height: 38px;
    max-width: 124px;
  }

  .wind-mark {
    position: relative;
    width: 40px;
    height: 26px;
  }

  .wind-mark::before,
  .wind-mark::after,
  .wind-mark span {
    content: "";
    position: absolute;
    left: 0;
    height: 3px;
    border-radius: 999px;
    background: rgba(247,251,255,0.96);
    box-shadow: 0 3px 9px rgba(18,74,138,0.28);
  }

  .wind-mark::before { top: 4px; width: 34px; }
  .wind-mark span { top: 12px; width: 40px; }
  .wind-mark::after { top: 20px; width: 24px; }

  .wind-label {
    font-size: 13px;
    line-height: 1.22;
    font-weight: 700;
    color: rgba(238,249,255,0.92);
    text-shadow: 0 3px 9px rgba(18,74,138,0.26);
    white-space: nowrap;
  }
</style>
</head>
<body>
  <div class="dashboard">
    <div class="edge-glow"></div>
    <div class="corner-glint tl"></div>
    <div class="corner-glint br"></div>
    <div class="header">
      <div class="title">7日天气预报</div>
      <div class="subtitle"><span class="pin"></span><span>{{SUBTITLE}}</span></div>
    </div>
    <div class="top-metrics">
      <div class="metric-chip live">
        <div class="metric-label">实况气温</div>
        <div class="metric-value">{{LIVE_TEMP}}°</div>
        <div class="metric-sub">{{LIVE_WEATHER}}</div>
      </div>
      <div class="metric-chip alert alert-{{ALERT_SEVERITY}}">
        <div class="metric-label">灾害预警</div>
        <div class="alert-row">
          <span class="alert-dot"></span>
          <div class="metric-value">{{ALERT_TEXT}}</div>
        </div>
      </div>
    </div>
    <div class="divider"></div>
    <div class="forecast-grid">
      {{DAILY_COLUMNS}}
    </div>
  </div>
</body>
</html>
